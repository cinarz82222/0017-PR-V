<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Envanter</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&family=Russo+One&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1f202c;padding:20px;font-family:'Exo 2',sans-serif;color:#fff}
    .card{width:1200px;min-height:800px;background:#1f202c;border-radius:24px;overflow:hidden}
    .content{padding:20px;background:rgba(10,12,25,0.8);border-radius:16px;color:#fff}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
    .user-info{display:flex;align-items:center;gap:15px}
    .avatar{border-radius:50%;width:100px;height:100px;object-fit:cover;border:3px solid rgba(255,255,255,0.2)}
    .title{font-family:'Russo One',sans-serif;font-size:39px;background:linear-gradient(90deg,#ff8a00,#da1b60);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .section{margin-top:19px}
    .section-title{font-size:28px;margin-bottom:8px;color:#fff}
    .items{display:flex;gap:15px;flex-wrap:wrap}
    .item{background:rgba(255,255,255,0.05);border-radius:10px;padding:15px;text-align:center;min-width:120px}
    .item .value{font-size:28px;font-weight:700}
    .item .label{font-size:18px;color:#bbb;margin-top:5px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-top:8px}
    .stat{background:rgba(255,255,255,0.05);border-radius:10px;padding:12px;text-align:center}
    .stat .value{font-size:24px;font-weight:600}
    .stat .label{font-size:16px;color:#bbb;margin-top:4px}
    .footer{margin-top:15px;text-align:center;font-size:12px;color:#666}
  </style>
</head>
<body>
  <div class="card">
    <div class="content">
      <div class="header">
        <div class="user-info">
          <img src="https://cdn.discordapp.com/embed/avatars/0.png" class="avatar">
          <div>
            <div style="font-size:28px;font-weight:600">Kullanıcı</div>
            <div style="font-size:16px;color:#bbb">Seviye 5 • XP: 250/500</div>
          </div>
        </div>
        <h1 class="title">ENVANTER</h1>
      </div>
      <div class="section">
        <div class="section-title">💰 Para & Coinler</div>
        <div class="items">
          <div class="item"><div class="value">10.000</div><div class="label">NAKİT</div></div>
          <div class="item"><div class="value">500</div><div class="label">ROEL COIN</div></div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">📊 Oyun İstatistikleri</div>
        <div class="stats">
          <div class="stat"><div class="value">5</div><div class="label">Güncel Seri</div></div>
          <div class="stat"><div class="value">10</div><div class="label">Max Seri</div></div>
          <div class="stat"><div class="value">25</div><div class="label">Kazanç</div></div>
          <div class="stat"><div class="value">%52</div><div class="label">Kazanma Oranı</div></div>
        </div>
      </div>
      <div class="footer">14 Mart 2026 • Adel Was Here ❤️</div>
    </div>
  </div>
</body>
</html>
