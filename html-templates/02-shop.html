<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mağaza</title>
  <link href="https://fonts.googleapis.com/css2?family=Whitney:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; padding: 20px; width: 800px; background: #36393f; font-family: 'Whitney', sans-serif; }
    .shop { width: 760px; background: #2f3136; border-radius: 8px; padding: 20px; color: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
    .shop h1 { text-align: center; margin: 5px 0 10px; font-size: 28px; background: linear-gradient(90deg, #8e9ff5, #c093ed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .category { margin: 15px 0; background: rgba(32, 34, 37, 0.6); border-radius: 10px; padding: 12px; }
    .category h2 { font-size: 18px; margin: 0 0 10px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #f0f0f0; }
    .products { display: flex; flex-wrap: wrap; gap: 15px; }
    .item { width: 140px; background: #202225; border-radius: 6px; padding: 10px; text-align: center; }
    .item img { width: 50px; height: 50px; margin: auto; display: block; }
    .item .icon { font-size: 32px; margin: 4px auto; display: block; }
    .item .name { margin: 8px 0 4px; font-size: 14px; font-weight: 600; }
    .item .price { font-size: 12px; color: #b9bbbe; }
  </style>
</head>
<body>
  <div class="shop">
    <h1>Sunucu Mağazası</h1>
    <div class="category">
      <h2>💍 Yüzükler</h2>
      <div class="products">
        <div class="item"><img src="https://cdn.discordapp.com/emojis/590393334384558110.png" alt="Pırlanta"><div class="name">Pırlanta</div><div class="price">500 💰</div></div>
        <div class="item"><img src="https://cdn.discordapp.com/emojis/590393334036693004.png" alt="Baget"><div class="name">Baget</div><div class="price">300 💰</div></div>
        <div class="item"><img src="https://cdn.discordapp.com/emojis/590393334003138570.png" alt="Tektaş"><div class="name">Tektaş</div><div class="price">400 💰</div></div>
      </div>
    </div>
    <div class="category">
      <h2>🎁 Hediyeler</h2>
      <div class="products">
        <div class="item"><div class="icon">🍫</div><div class="name">Çikolata</div><div class="price">100 💰</div></div>
        <div class="item"><div class="icon">🌹</div><div class="name">Çiçek</div><div class="price">150 💰</div></div>
        <div class="item"><div class="icon">💋</div><div class="name">Öpücük</div><div class="price">200 💰</div></div>
      </div>
    </div>
  </div>
</body>
</html>
