<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Günlük Ödül</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&family=Russo+One&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body, html { width:100%; height:100%; font-family:'Exo 2', sans-serif; overflow:hidden; }
  .card { position:relative; width:900px; height:500px; background:linear-gradient(135deg, #1f202c, #2c3e50); border-radius:24px; overflow:hidden; }
  .bg-hex { position:absolute; inset:0; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 100 100"><path fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" d="M50 0 L93.3 25 L93.3 75 L50 100 L6.7 75 L6.7 25 Z"/></svg>'); background-size:60px; }
  .glow { position:absolute; border-radius:50%; width:600px; height:600px; filter:blur(40px); background:radial-gradient(circle, rgba(255,215,0,0.3) 0%, rgba(255,215,0,0) 70%); top:-300px; left:-200px; }
  .glow.blue { background:radial-gradient(circle, rgba(77,213,254,0.3) 0%, rgba(77,213,254,0) 60%); bottom:-300px; right:-200px; top:auto; left:auto; }
  .content { position:absolute; inset:20px; background:rgba(10,12,25,0.7); border-radius:16px; backdrop-filter:blur(12px); display:flex; flex-direction:column; padding:30px; }
  .header { display:flex; justify-content:space-between; align-items:center; color:#fff; }
  .title { font-family:'Russo One',sans-serif; font-size:48px; background:linear-gradient(90deg,#ff8a00,#da1b60); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .subtitle { font-size:18px; color:#ccc; margin-top:5px; }
  .user { display:flex; align-items:center; }
  .avatar-wrap { position:relative; width:120px; height:120px; }
  .avatar-ring { position:absolute; inset:-8px; border-radius:50%; background:conic-gradient(#ff8a00,#e52e71); }
  .avatar-mask { position:absolute; inset:8px; overflow:hidden; border-radius:50%; }
  .avatar-mask img { width:100%; height:100%; object-fit:cover; }
  .username { margin-left:20px; font-size:32px; color:#fff; }
  .rewards { display:flex; flex:1; justify-content:space-around; align-items:center; margin:30px 0; }
  .card-box { background:rgba(255,255,255,0.05); border-radius:16px; width:40%; padding:20px; display:flex; flex-direction:column; align-items:center; }
  .icon { width:60px; height:60px; margin-bottom:15px; }
  .value { font-size:40px; font-weight:800; }
  .cash .value { background:linear-gradient(to right,#44bd32,#78e08f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .coin .value { background:linear-gradient(to right,#f9ca24,#f0932b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .label { font-size:16px; color:#bbb; margin-top:5px; }
  .streak { text-align:center; padding:10px 0; color:#fff; font-size:18px; }
  .footer { display:flex; justify-content:space-between; color:#aaa; font-size:14px; }
  .footer span { color:#ff8a00; font-weight:600; }
</style>
</head>
<body>
  <div class="card">
    <div class="bg-hex"></div>
    <div class="glow"></div>
    <div class="glow blue"></div>
    <div class="content">
      <div class="header">
        <div>
          <h1 class="title">GÜNLÜK ÖDÜL</h1>
          <p class="subtitle">Ödülünü topla ve ekonomide yüksel!</p>
        </div>
        <div class="user">
          <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <div class="avatar-mask">
              <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar">
            </div>
          </div>
          <div class="username">Kullanıcı</div>
        </div>
      </div>
      <div class="rewards">
        <div class="card-box cash">
          <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f4b5.png" class="icon" alt="Cash">
          <h2 class="value">2500$</h2>
          <div class="label">NAKİT BONUS</div>
        </div>
        <div class="card-box coin">
          <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1fa99.png" class="icon" alt="Coin">
          <h2 class="value">50</h2>
          <div class="label">ROEL COIN</div>
        </div>
      </div>
      <div class="streak">Günlük Seri: <span>7 gün</span></div>
      <div class="footer">
        <div>Toplama Tarihi: 14 Mart 2026</div>
        <div>Bir sonraki ödül: <span>24 saat</span> sonra</div>
      </div>
    </div>
  </div>
</body>
</html>
