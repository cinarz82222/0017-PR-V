<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root { --card-bg: #1e1e2e; --card-border: #8b5cf6; --reel-bg: #2a2937; --reel-border: #4f46e5; --text-color: #e0e0e0; --accent-color: #ffcc00; }
    * { box-sizing: border-box; }
    body { margin: 0; background: linear-gradient(135deg, #11101d 0%, #282336 100%); font-family: 'Press Start 2P', cursive; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: var(--card-bg); border: 4px solid var(--card-border); border-radius: 16px; padding: 24px; width: 500px; color: var(--text-color); }
    .header { display: flex; align-items: center; margin-bottom: 20px; }
    .header img { width: 40px; height: 40px; margin-right: 12px; border-radius: 8px; border: 2px solid var(--reel-border); }
    .header h1 { font-size: 20px; color: var(--accent-color); margin: 0; }
    .reels { display: flex; justify-content: space-between; }
    .reel { background: var(--reel-bg); border: 3px solid var(--reel-border); border-radius: 12px; width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; font-size: 64px; color: var(--accent-color); }
    .footer { margin-top: 24px; display: flex; flex-wrap: wrap; font-size: 12px; gap: 8px 0; }
    .footer span { width: 50%; }
    .footer strong { color: var(--accent-color); text-transform: uppercase; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="icon">
      <h1>🎰 Slot Sonucu</h1>
    </div>
    <div class="reels">
      <div class="reel">💎</div>
      <div class="reel">💎</div>
      <div class="reel">💎</div>
    </div>
    <div class="footer">
      <span><strong>🌟 JACKPOT!</strong></span>
      <span>Bahis: 100$</span>
      <span>Kazanç: 2400$</span>
      <span>EXP: +3 | Lv: 2→3</span>
    </div>
  </div>
</body>
</html>
