<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Evlilik Sertifikası</title>
  <link href="https://fonts.googleapis.com/css2?family=Whitney:wght@300;400;500;600;700&family=Ginto:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 820px; height: 460px; background: #36393f; font-family: 'Whitney', sans-serif; }
    .card { width: 780px; height: 420px; background: #2f3136; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.2); display: flex; flex-direction: column; border: 1px solid #202225; }
    .header { text-align: center; padding: 20px 0 10px; background: #202225; }
    .header h1 { font-family: 'Ginto', sans-serif; font-size: 32px; color: #ffffff; }
    .header .subtitle { font-size: 14px; color: #b9bbbe; text-transform: uppercase; }
    .profile-container { display: flex; justify-content: space-around; align-items: center; padding: 20px 30px; flex: 1; }
    .profile { display: flex; flex-direction: column; align-items: center; }
    .avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #202225; margin-bottom: 10px; }
    .username { font-weight: 600; font-size: 18px; color: #ffffff; }
    .heart-container { display: flex; flex-direction: column; align-items: center; margin: 0 20px; }
    .heart { color: #ed4245; font-size: 50px; }
    .ring-info { display: flex; align-items: center; background: rgba(47,49,54,0.6); padding: 8px 15px; border-radius: 4px; margin-top: 10px; }
    .ring-icon { width: 24px; height: 24px; margin-right: 8px; }
    .note { text-align: center; padding: 6px 12px; background: #202225; color: #ffffff; font-size: 16px; margin: 5px 20px; border-radius: 4px; }
    .quote { text-align: center; font-style: italic; color: #b9bbbe; font-size: 14px; margin: 0 20px 10px; }
    .date { display: inline-block; background: #202225; color: #b9bbbe; padding: 8px 16px; border-radius: 4px; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Sonsuz Aşk</h1>
      <div class="subtitle">Evlilik Sertifikası</div>
    </div>
    <div class="profile-container">
      <div class="profile">
        <img class="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Kullanıcı">
        <div class="username">Kullanıcı1</div>
      </div>
      <div class="heart-container">
        <div class="heart">❤️</div>
        <div class="ring-info">
          <img class="ring-icon" src="https://cdn.discordapp.com/emojis/590393334384558110.png" alt="Yüzük">
          <div>Pırlanta</div>
        </div>
      </div>
      <div class="profile">
        <img class="avatar" src="https://cdn.discordapp.com/embed/avatars/1.png" alt="Eş">
        <div class="username">Kullanıcı2</div>
      </div>
    </div>
    <div class="note">Bugün aşkınızın 30. günü! Nice mutlu yıllara 💕</div>
    <div class="quote">"Aşk, iki ruhun tek bir bedende dans etmesidir."</div>
    <div style="text-align:center;"><div class="date">📆 14.02.2026 (30 Gün)</div></div>
  </div>
</body>
</html>
